name: "Claude request"
description: "Ask Claude to plan, implement, or prepare project work."
title: "Claude Request: "
labels:
  - "trigger:speckit-auto"
  - "agent:claude"
  - "status:queued"
  - "type:workflow"
body:
  - type: markdown
    attributes:
      value: |
        Use this form when Claude should handle the request. Claude will leave progress comments and update labels as it works.
  - type: textarea
    id: trigger
    attributes:
      label: Assistant marker
      description: Leave this as `/speckit-auto` for Claude. It routes the request to the Claude Spec Kit workflow.
      value: "/speckit-auto"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: How much help do you want?
      description: Choose whether the assistant should only prepare a plan or may also make changes.
      options:
        - "Prepare a plan and ask before making changes (gated)"
        - "Make safe, low-risk changes after checking the plan (auto-implement)"
        - "Make changes and prepare a draft pull request (auto-pr)"
        - "Make sliced changes and prepare stacked draft pull requests (auto-stack-pr)"
      default: 0
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: What do you need?
      description: Describe the content, document, workflow, or project change you want.
      placeholder: "What should be changed, created, reviewed, or prepared?"
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Important limits
      description: Mention any files, topics, languages, or areas that should be included or avoided.
      placeholder: "Please include: ...\nPlease avoid: ..."
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: How will we know this is done?
      description: List the results you expect to see when the work is complete.
      placeholder: "- ...\n- ..."
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Checks to run
      description: Add any review steps, commands, or checks the assistant should use if relevant.
      placeholder: "- ..."
    validations:
      required: false
  - type: textarea
    id: subissues
    attributes:
      label: Can this be split into smaller issues?
      description: If the request is broad, say whether the assistant may create linked follow-up issues.
      value: "The assistant may create linked follow-up issues when the work is too broad or has separate parts."
    validations:
      required: false
