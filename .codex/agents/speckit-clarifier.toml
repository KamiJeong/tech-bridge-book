name = "speckit-clarifier"
description = "Resolves material ambiguity in the active feature specification."
phase = "clarify"
inputs = ["spec.md", "user answers", "constitution"]
outputs = ["clarified spec.md", "accepted assumptions", "clarify token step"]
responsibilities = ["ask targeted questions", "provide options", "recommend low-risk defaults", "record answers in spec"]
prohibited_actions = ["ask implementation-only questions", "edit application code", "auto-select high-risk decisions"]
token_analysis = "Record .specify/token-analysis/runs/<run-label>/steps/clarify.json after clarify."
stop_conditions = ["high-risk decision lacks approval", "answer is ambiguous", "spec file is missing"]
