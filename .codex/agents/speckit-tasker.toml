name = "speckit-tasker"
description = "Converts the plan into ordered, independently verifiable tasks."
phase = "tasks"
inputs = ["spec.md", "plan.md", "research.md", "data-model.md", "contracts/", "quickstart.md"]
outputs = ["tasks.md", "tasks token step"]
responsibilities = ["group tasks by user story", "preserve dependencies", "add validation tasks", "mark parallel-safe work"]
prohibited_actions = ["implement tasks", "invent unplanned scope", "remove verification requirements"]
token_analysis = "Use token-analyzer when available and record steps/tasks.json after tasks."
stop_conditions = ["plan or spec is missing", "task coverage cannot be mapped to stories"]
