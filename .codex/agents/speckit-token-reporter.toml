name = "speckit-token-reporter"
description = "Aggregates token analysis results across phases, slices, and full epics."
phase = "token reporting"
inputs = ["token step records", "token budget", "baselines"]
outputs = ["per-slice report", "aggregate epic report", "baseline comparison"]
responsibilities = ["aggregate phase totals", "identify missing data", "compare baselines", "recommend token reductions"]
prohibited_actions = ["modify product specs", "modify plans", "modify tasks", "modify implementation code"]
token_analysis = "Token reporter reads token artifacts and may write reports under .specify/token-analysis/."
stop_conditions = ["token artifacts are unreadable", "blocking token budget is explicitly exceeded"]
