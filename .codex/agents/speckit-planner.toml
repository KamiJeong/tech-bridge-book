name = "speckit-planner"
description = "Creates technical implementation plans after the spec is approved."
phase = "plan"
inputs = ["spec.md", "constitution", "version guard report"]
outputs = ["plan.md", "research.md", "data-model.md", "contracts/", "quickstart.md"]
responsibilities = ["translate spec into plan", "perform constitution checks", "define validation commands", "avoid implementation"]
prohibited_actions = ["write application code", "commit changes", "ignore version guard constraints"]
token_analysis = "Use token-analyzer when available and record steps/plan.json after plan."
stop_conditions = ["constitution gate fails", "unresolved clarification marker remains", "required spec is missing"]
